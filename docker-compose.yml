services:
  # MySQL 数据库服务
  mysql:
    image: mysql:8.0
    container_name: qqbot-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${DB_NAME:-qqbot}
      MYSQL_USER: ${DB_USER:-qqbot}
      MYSQL_PASSWORD: ${DB_PASSWORD:-qqbot123}
      TZ: Asia/Shanghai
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - "127.0.0.1:3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/seed.sql
    networks:
      - qqbot_network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      timeout: 20s
      retries: 10
      interval: 10s
    restart: unless-stopped

  # Tailscale VPN sidecar — 将出口流量通过笔记本路由到中大校园网
  tailscale:
    image: tailscale/tailscale:latest
    container_name: qqbot-tailscale
    hostname: DESKTOP-SYSU01
    environment:
      TS_AUTHKEY: ${TAILSCALE_AUTH_KEY}
      TS_STATE_DIR: /var/lib/tailscale/state
      TS_USERSPACE: "false"
      TS_EXTRA_ARGS: >
        --exit-node=${TAILSCALE_EXIT_NODE}
        --exit-node-allow-lan-access=true
        --accept-dns=false
    volumes:
      - tailscale_state:/var/lib/tailscale/state
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW
    ports:
      - "${NONEBOT_PORT:-8080}:8080"   # nonebot 管理后台 + 反向WS
      - "6099:6099"                      # napcat web UI
    networks:
      - qqbot_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "tailscale", "status", "--active"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s

  # NoneBot 应用服务
  nonebot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qqbot-nonebot
    user: "${UID:-1000}:${GID:-1000}"
    network_mode: "service:tailscale"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-qqbot}
      DB_USER: ${DB_USER:-qqbot}
      DB_PASSWORD: ${DB_PASSWORD:-qqbot123}
      DRIVER: ${DRIVER:-~fastapi}
      HOST: ${HOST:-0.0.0.0}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      NONEBOT_ADAPTER_ONEBOT_ACCESS_TOKEN: ${ONEBOT_ACCESS_TOKEN:-s~N9cCeg-SDmpwWM}
      NAPCAT_HOST: ${NAPCAT_HOST:-napcat}
      NAPCAT_PORT: ${NAPCAT_PORT:-3001}
      NAPCAT_WS_PATH: /onebot/v11/ws
      BOT_QQ: ${BOT_QQ:-123456789}
      GROUP_ID: ${GROUP_ID:-}
      TZ: Asia/Shanghai
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      PYTHONIOENCODING: utf-8
    volumes:
      - ./backend/bot:/app/bot
      - ./images:/app/images
      - ./config:/app/config
      - ./logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      tailscale:
        condition: service_started
    restart: unless-stopped
    command: python -m bot.main

  # NapCat 协议服务
  napcat:
    image: mlikiowa/napcat-docker:latest
    container_name: qqbot-napcat
    network_mode: "service:tailscale"
    environment:
      NAPCAT_UID: "${UID:-1000}"
      NAPCAT_GID: "${GID:-1000}"
      NAPCAT_ADMIN_ENDPOINT: "http://localhost:3000"
      NAPCAT_WS_ENDPOINT: "ws://localhost:3001"
      NAPCAT_ONEBOT_V11_REVERSE_WS: "ws://localhost:8080/onebot/v11/ws"
    volumes:
      - napcat_data:/opt/napcat/data
      - ./images:/app/images
      - napcat_plugins:/app/napcat/plugins
      - napcat_qq_config:/app/.config/QQ
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local
  napcat_data:
    driver: local
  napcat_plugins:
    driver: local
  napcat_qq_config:
    driver: local
  tailscale_state:
    driver: local

networks:
  qqbot_network:
    driver: bridge
