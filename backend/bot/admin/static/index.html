<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QQBot 管理后台</title>
    <link rel="stylesheet" href="/admin/static/admin.css" />
</head>

<body>
    <!-- Toast 容器 -->
    <div class="toast-container" id="toastContainer" role="status" aria-live="polite"></div>

    <div class="app-layout">

        <!-- ============ 侧边栏 ============ -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                QQBot
                <small>Admin Console</small>
            </div>
            <nav class="sidebar-nav">
                <a class="nav-item active" data-tab="overview" data-title="概览" data-desc="系统关键指标与最近请求记录" href="#overview" aria-current="page">
                    <span class="nav-icon"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 5a1 1 0 011-1h4a1 1 0 011 1v5a1 1 0 01-1 1H5a1 1 0 01-1-1V5zm10 0a1 1 0 011-1h4a1 1 0 011 1v2a1 1 0 01-1 1h-4a1 1 0 01-1-1V5zm0 8a1 1 0 011-1h4a1 1 0 011 1v5a1 1 0 01-1 1h-4a1 1 0 01-1-1v-5zm-10 3a1 1 0 011-1h4a1 1 0 011 1v2a1 1 0 01-1 1H5a1 1 0 01-1-1v-2z"/></svg></span>概览
                </a>
                <a class="nav-item" data-tab="actors" data-title="声优管理" data-desc="新增、查看和启用/禁用声优" href="#actors">
                    <span class="nav-icon"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg></span>声优管理
                </a>
                <a class="nav-item" data-tab="images" data-title="图片管理" data-desc="浏览、上传和管理声优图片" href="#images">
                    <span class="nav-icon"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg></span>图片管理
                </a>
                <a class="nav-item" data-tab="aliases" data-title="别名管理" data-desc="管理全局别名映射，将关键词路由到目标声优" href="#aliases">
                    <span class="nav-icon"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/></svg></span>别名管理
                </a>
                <a class="nav-item" data-tab="sync" data-title="图片同步" data-desc="对文件系统与数据库做增量同步" href="#sync">
                    <span class="nav-icon"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg></span>图片同步
                </a>
            </nav>
            <div class="sidebar-footer">
                <span class="status-dot pulse" id="statusDot"></span>
                <span id="statusText">就绪</span>
            </div>
        </aside>

        <!-- ============ 主内容区 ============ -->
        <main class="main-content">

            <!-- ===== Glass Header ===== -->
            <div class="glass-header">
                <div>
                    <span class="tab-title" id="tabTitle">概览</span>
                    <span class="tab-desc" id="tabDesc">系统关键指标与最近请求记录</span>
                </div>
                <div class="glass-header-actions">
                    <button class="small secondary" id="headerRefreshBtn" style="display:none">刷新</button>
                </div>
            </div>

            <div class="page-body">

                <!-- ===== 概览 ===== -->
                <section class="tab-panel active" id="tab-overview">
                    <div class="stat-grid" id="overviewMetrics"></div>
                    <div id="systemGauges">
                        <span class="empty-state" style="padding:20px"><p>加载中...</p></span>
                    </div>
                    <div class="card">
                        <h3>最近 20 条请求</h3>
                        <div id="overviewLogs"></div>
                        <button class="small secondary" id="refreshOverview" style="margin-top:12px;width:auto">刷新</button>
                    </div>
                </section>

                <!-- ===== 声优管理 ===== -->
                <section class="tab-panel" id="tab-actors">
                    <div class="card">
                        <div class="inline">
                            <div>
                                <label for="actorName">声优名称</label>
                                <input id="actorName" placeholder="输入声优名称" autocomplete="off" />
                            </div>
                            <div>
                                <label for="actorDesc">描述（可选）</label>
                                <input id="actorDesc" placeholder="简短描述" autocomplete="off" />
                            </div>
                        </div>
                        <button id="addActor" style="width:auto;margin-top:8px">新增声优</button>
                    </div>
                    <div class="card">
                        <div class="search-bar">
                            <input id="searchActor" placeholder="搜索声优..." autocomplete="off" style="max-width:280px" />
                        </div>
                        <div id="actorTable"></div>
                    </div>
                </section>

                <!-- ===== 图片管理 ===== -->
                <section class="tab-panel" id="tab-images">
                    <div class="card">
                        <h3>上传图片</h3>
                        <div class="inline">
                            <div>
                                <label for="imgUploadActor">目标声优</label>
                                <select id="imgUploadActor"></select>
                            </div>
                            <div>
                                <label for="imgFileInput">选择图片</label>
                                <input type="file" id="imgFileInput" accept="image/*" />
                            </div>
                        </div>
                        <button id="uploadImgBtn" style="width:auto;margin-top:8px">上传</button>
                    </div>
                    <div class="card">
                        <div class="inline">
                            <div>
                                <label for="imgFilterActor">按声优筛选</label>
                                <select id="imgFilterActor">
                                    <option value="">全部声优</option>
                                </select>
                            </div>
                            <div>
                                <label for="imgSearch">搜索文件名</label>
                                <input id="imgSearch" placeholder="搜索文件名..." autocomplete="off" style="max-width:280px" />
                            </div>
                        </div>
                        <div id="imageTable"></div>
                        <div id="imagePagination" class="pagination"></div>
                    </div>
                </section>

                <!-- ===== 别名管理 ===== -->
                <section class="tab-panel" id="tab-aliases">
                    <div class="card">
                        <div class="inline">
                            <div>
                                <label for="aliasName">别名</label>
                                <input id="aliasName" placeholder="输入别名" autocomplete="off" />
                            </div>
                            <div>
                                <label for="aliasTarget">目标声优</label>
                                <select id="aliasTarget"></select>
                            </div>
                        </div>
                        <div class="inline">
                            <div>
                                <label for="aliasPriority">优先级</label>
                                <input id="aliasPriority" type="number" placeholder="0" value="0" />
                            </div>
                            <div style="display:flex;align-items:flex-end">
                                <button id="addAlias">新增别名</button>
                            </div>
                        </div>
                    </div>
                    <div class="card">
                        <div class="search-bar">
                            <input id="searchAlias" placeholder="搜索别名..." autocomplete="off" style="max-width:280px" />
                        </div>
                        <div id="aliasTable"></div>
                    </div>
                </section>

                <!-- ===== 图片同步 ===== -->
                <section class="tab-panel" id="tab-sync">
                    <div class="card">
                        <button id="syncBtn" style="width:auto">执行同步</button>
                        <div id="syncResult"></div>
                    </div>
                </section>

            </div>
        </main>
    </div>

    <script src="/admin/static/admin.js"></script>
</body>

</html>
